name: API tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out test server repository
        uses: actions/checkout@v4
        with:
          repository: Nikita-Filonov/qa-automation-engineer-api-course
          path: qa-automation-engineer-api-course

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            qa-automation-engineer-api-course/requirements.txt

      - name: Install test server dependencies
        run: pip install -r qa-automation-engineer-api-course/requirements.txt

      - name: Start a test server
        env:
          APP_HOST: ${{ vars.APP_HOST }}
          DATABASE_URL: ${{ vars.DATABASE_URL }}
          JWT_ALGORITHM: ${{ vars.JWT_ALGORITHM }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          JWT_ACCESS_TOKEN_EXPIRE: ${{ vars.JWT_ACCESS_TOKEN_EXPIRE }}
          JWT_REFRESH_TOKEN_EXPIRE: ${{ vars.JWT_REFRESH_TOKEN_EXPIRE }}
        run: uvicorn main:app --host 0.0.0.0 --port 8000 --app-dir ./qa-automation-engineer-api-course &

      - name: Wait for test server to be ready
        run: curl --retry 30 --retry-delay 1 --retry-connrefused http://localhost:8000/openapi.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests with pytest and generate Allure results
        env:
          TEST_DATA.IMAGE_PNG_FILE: ${{ vars.TEST_DATA_IMAGE_PNG_FILE }}
          HTTP_CLIENT.URL: ${{ vars.HTTP_CLIENT_URL }}
          HTTP_CLIENT.TIMEOUT: ${{ vars.HTTP_CLIENT_TIMEOUT }}
        run: |
          pytest -m regression --alluredir=allure-results --numprocesses=2

      - name: Restore Coverage history
        if: always()
        uses: actions/cache/restore@v4
        with:
          path: swagger-coverage/coverage-history.json
          key: coverage-history-${{ github.run_id }}
          restore-keys: |
            coverage-history-

      - name: Generate Coverage report
        if: always()
        run: |
          mkdir -p swagger-coverage
          swagger-coverage-tool save-report

      - name: Cache Coverage history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: swagger-coverage/coverage-history.json
          key: coverage-history-${{ github.run_id }}

      - name: Upload Coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: swagger-coverage/index.html

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

  publish-report:
    needs: run-tests
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Download Coverage report
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage-report

      - name: Generate Allure Report with history
        uses: simple-elf/allure-report-action@v1.13
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history

      - name: Prepare deploy directory
        if: always()
        run: |
          mkdir -p deploy/coverage
          sudo cp -r allure-history/* deploy/
          if [ -f coverage-report/index.html ]; then
            cp coverage-report/index.html deploy/coverage/index.html
          elif [ -f gh-pages/coverage/index.html ]; then
            cp gh-pages/coverage/index.html deploy/coverage/index.html
          fi

      - name: Deploy reports to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: deploy
